<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>30 Questions</title>
  <style>
    :root{--bg:#f6f8fb;--card:#fff;--accent:#2b6cb0;--correct:#28a745;--wrong:#dc3545}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;margin:0;background:var(--bg);color:#111}
    header{background:linear-gradient(90deg,#1f6fb8,#2b6cb0);color:white;padding:18px 24px}
    .container{max-width:980px;margin:18px auto;padding:18px}
    .card{background:var(--card);border-radius:10px;box-shadow:0 6px 20px rgba(20,20,40,0.06);padding:18px}
    h1{margin:0 0 6px;font-size:20px}
    p.lead{margin:6px 0 16px;color:#334155}
    .question{padding:12px;border-radius:8px;margin-bottom:10px;border:1px solid #eef2f7}
    .qnum{font-weight:600;margin-bottom:6px}
    .options{display:flex;gap:12px;flex-wrap:wrap}
    label.opt{flex:1;min-width:150px;background:#f8fafc;padding:10px;border-radius:8px;border:1px solid #e6eef8;cursor:pointer}
    input[type=radio]{margin-right:8px}
    .controls{display:flex;gap:10px;align-items:center;margin-top:14px}
    button{background:var(--accent);color:white;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
    button.secondary{background:#6b7280}
    .result{margin-top:14px;padding:12px;border-radius:8px}
    .correct{background:rgba(40,167,69,0.08);border:1px solid rgba(40,167,69,0.18);color:var(--correct)}
    .wrong{background:rgba(220,53,69,0.06);border:1px solid rgba(220,53,69,0.12);color:var(--wrong)}
    .small{font-size:13px;color:#475569}
    footer{max-width:980px;margin:20px auto;text-align:center;color:#64748b}
    @media (max-width:700px){.options{flex-direction:column}}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>TRẮC NGHIỆM BÀI 10S</h1>
      <div class="small">Điền chọn A, B, C hoặc D cho mỗi câu. Nhấn "Nộp bài" để chấm điểm và xem đáp án.</div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <form id="quizForm">
        <div id="questions"></div>

        <div class="controls">
          <button type="button" id="submitBtn">Nộp bài</button>
          <button type="button" id="resetBtn" class="secondary">Làm lại</button>
          <div id="score" style="margin-left:auto"></div>
        </div>
      </form>

      <div id="feedback" style="margin-top:12px"></div>
    </div>
  </main>

  <footer>
    <div class="small">BÀI 10: CÔNG CUỘC ĐỔI MỚI Ở VIỆT NAM TỬ NĂM 1986 ĐẾN NAY</div>
  </footer>

  <script>
const questionsData = [
  {
    id: 1,
    q: "Vốn gene của quần thể là tập hợp của tất cả",
    opts: {
      A: "các kiểu hình trong quần thể tại một thời điểm xác định.",
      B: "các kiểu gene trong quần thể tại một thời điểm xác định.",
      C: "các allele của tất cả các gen trong quần thể tại một thời điểm xác định.",
      D: "các gene trong quần thể tại một thời điểm xác định"
    },
    answer: "C"
  },
  {
    id: 2,
    q: "Vốn gene của một quần thể không thay đổi qua nhiều thế hệ. Điều nào là cần thiết để hiện tượng trên xảy ra?",
    opts: {
      A: "Đột biến không xảy ra.",
      B: "Quần thể đạt cân bằng di truyền.",
      C: "Quần thể cách li với các quần thể khác.",
      D: "Không xảy ra các yếu tố ngẫu nhiên."
    },
    answer: "B"
  },
  {
    id: 3,
    q: "Tần số allele là",
    opts: {
      A: "Tập hợp tất cả các allele trong quần thể",
      B: "Tỷ lệ số lượng allele đó trên tổng số lượng các loại allele trong quần thể tại một thời điểm xác định.",
      C: "Tỷ lệ số lượng allele đó trên tổng số lượng các loại allele khác nhau của gene đó trong quần thể",
      D: "Tỉ lệ giữa số bản sao allele đó trên tổng số bản sao của các allele thuộc một gene có trong quần thể"
    },
    answer: "D"
  },
  {
    id: 4,
    q: "Tần số kiểu gene là",
    opts: {
      A: "Tập hợp tất cả các kiểu gene trong quần thể",
      B: "Tỷ lệ số cá thể có kiểu gene đó trên tổng số lượng các loại kiểu gene trong quần thể tại một thời điểm xác định.",
      C: "Tỷ lệ số cá thể có kiểu gene đó trên tổng số lượng cá thể có khả năng sinh sản trong quần thể.",
      D: "Tỷ lệ số cá thể mang kiểu gene đó trên tổng số cá thể của quần thể"
    },
    answer: "D"
  },
  {
    id: 5,
    q: "Tần số thể dị hợp ngày càng giảm, đồng hợp ngày càng tăng biểu hiện rõ nhất ở",
    opts: {
      A: "Quần thể ngẫu phối",
      B: "Quần thể giao phối có lựa chọn",
      C: "Quần thể tự phối và ngẫu phối",
      D: "Quần thể thực vật tự phối bắt buộc"
    },
    answer: "D"
  },
  {
    id: 6,
    q: "Phát biểu nào sau đây là đúng với định luật Hardy - Weinberg?",
    opts: {
      A: "Trong những điều kiện nhất định thì trong lòng một quần thể giao phối tần số của các allele trội có khuynh hướng tăng dần, tần số các allele lặn có khuynh hướng giảm dần qua các thế hệ.",
      B: "Trong những điều kiện nhất định thì trong lòng một quần thể giao phối tần số tương đối của các allele ở mỗi gene có khuynh hướng tăng dần từ thế hệ này sang thế hệ khác.",
      C: "Trong những điều kiện nhất định thì trong lòng một quần thể giao phối tần số tương đối của các allele ở mỗi gene có khuynh hướng duy trì không đổi từ thế hệ này sang thế hệ khác.",
      D: "Trong những điều kiện nhất định thì trong lòng một quần thể giao phối tần số tương đối của các allele ở mỗi gene có khuynh hướng giảm dần qua các thế hệ."
    },
    answer: "C"
  },
  {
    id: 7,
    q: "Trạng thái cân bằng di truyền của quần thể là trạng thái mà trong đó",
    opts: {
      A: "Tỉ lệ cá thể đực và cái được duy trì ổn định qua các thế hệ.",
      B: "Số lượng cá thể được duy trì ổn định qua các thế hệ.",
      C: "Tần số các allele và tần số các kiểu gene biến đổi qua các thế hệ.",
      D: "Tần số các allele và tần số các kiểu gene được duy trì ổn định qua các thế hệ."
    },
    answer: "D"
  },
  {
    id: 8,
    q: "Dấu hiệu nào không phải là điều kiện nghiệm đúng của định luật Hardy - Weinberg:",
    opts: {
      A: "Mọi cá thể trong quần thể đều sống sót và sinh sản như nhau.",
      B: "Không xảy ra đột biến.",
      C: "Giảm phân bình thường các giao tử có khả năng thụ tinh như nhau.",
      D: "Quần thể phải lớn, không có sự giao phối tự do."
    },
    answer: "D"
  },
  {
    id: 9,
    q: "Định luật Hardy - Weinberg phản ánh",
    opts: {
      A: "Trạng thái động của quần thể.",
      B: "Sự mất ổn định của tần số allele trong quần thể.",
      C: "Sự ổn định của tần số allele trong quần thể.",
      D: "Trạng thái cân bằng của quần thể."
    },
    answer: "D"
  },
  {
    id: 10,
    q: "Ý nghĩa thực tiễn của định luật Hardy - Weinberg là:",
    opts: {
      A: "Phản ánh trạng thái cân bằng di truyền trong quần thể.",
      B: "Có thể xác định tần số tương đối của các kiểu gene và các allele từ tỉ lệ các loại kiểu hình trong quần thể.",
      C: "Khẳng định sự duy trì những đặc điểm đã đạt được trong tiến hóa cũng quan trọng không kém sự phát sinh các đặc điểm mới và sự biến đổi các đặc điểm đã có.",
      D: "Cơ sở để giải thích vì sao trong thiên nhiên có những quần thể được duy trì ổn định qua thời gian dài."
    },
    answer: "B"
  },
  {
    id: 11,
    q: "Khi nói về cấu trúc di truyền của quần thể tự thụ phấn, phát biểu nào sau đây sai?",
    opts: {
      A: "Quần thể tự thụ phấn thường bao gồm các dòng thuần chủng khác nhau về kiểu gene.",
      B: "Qua các thế hệ tự thụ phấn, các allele lặn trong quần thể có xu hướng được biểu hiện ra kiểu hình",
      C: "Nếu không có tác động của các nhân tố tiến hóa khác thì tần số các allele trong quần thể tự thụ phấn không thay đổi qua các thế hệ",
      D: "Quần thể tự thụ phấn thường có độ đa dạng di truyền cao hơn quần thể giao phấn"
    },
    answer: "D"
  },
  {
    id: 12,
    q: "Giao phối gần hoặc tự thụ phấn qua nhiều thế hệ sẽ dẫn đến hiện tượng thoái hóa giống vì",
    opts: {
      A: "Các gene lặn đột biến có hại biểu hiện thành kiểu hình do chúng được đưa về trạng thái đồng hợp",
      B: "Tập trung các gene trội có hại ở thế hệ sau",
      C: "Các gene lặn đột biến có hại bị các gene trội  át chế trong kiểu gene dị hợp",
      D: "Xuất hiện ngày càng nhiều các đột biến có hại"
    },
    answer: "A"
  },
  {
    id: 13,
    q: "Khi nói về quần thể tự phối, phát biểu nào sau đây không đúng:",
    opts: {
      A: "Quần thể phân hóa thành các dòng thuần.",
      B: "Chọn lọc từ các quần thể thường kém hiệu quả",
      C: "Số thể đồng hợp tăng, dị hợp giảm.",
      D: "Quần thể đa dạng về kiểu gene, kiểu hình"
    },
    answer: "D"
  },
  {
    id: 14,
    q: "Điều luật cấm kết hôn gần dựa trên cơ sở di truyền nào:",
    opts: {
      A: "Ngăn cản tổ hợp allele trội làm thoái hóa giống.",
      B: "Hạn chế dị tật do allele lặn gậy ra.",
      C: "Đảm bảo luân thường đạo lý làm người.",
      D: "Thực hiện thuần phong mỹ tục của dân tộc."
    },
    answer: "B"
  },
  {
    id: 15,
    q: "Nếu một quần thể tự thụ phấn qua nhiều thế hệ thì tần số allele và thành phần kiểu gene của quần thể sẽ biến đổi như thế nào?",
    opts: {
      A: "Tân số allele thay đổi theo hướng làm tăng allele trội và giảm allele lặn, nhưng tần số kiểu gene không thay đổi.",
      B: "Tần số allele không thay đổi nhưng tần số kiểu gene thay đổi theo hướng giảm tỉ lệ đồng hợp và tăng tỉ lệ dị hợp.",
      C: "Tân số allele thay đổi theo hướng làm tăng allele lặn và giảm allele trội, nhưng tần số kiểu gene không thay đổi.",
      D: "Tân số allele không thay đổi nhung tần số kiểu gene thay đổi theo hướng giảm tỉ lệ dị hợp và tăng tỉ lệ đồng hợp."
    },
    answer: "D"
  },
  {
    id: 16,
    q: "Trong chọn giống, người ta tiến hành tự thụ phấn bắt buộc và giao phối cận huyết nhằm",
    opts: {
      A: "tăng tỉ lệ thể dị hợp.",
      B: "giảm tỉ lệ thể đồng hợp.",
      C: "tăng biến dị tổ hợp.",
      D: "tạo dòng thuần chủng"
    },
    answer: "D"
  },
  {
    id: 17,
    q: "Một quần thể có cấu trúc di truyền 0,04 AA + 0,32 Aa + 0,64 aa = 1. Tần số tương đối của allele A, a lần lượt là",
    opts: {
      A: "0,3 ; 0,7",
      B: "0,8 ; 0,2",
      C: "0,7 ; 0,3",
      D: "0,2 ; 0,8"
    },
    answer: "D"
  },
  {
    id: 18,
    q: "Đặc trưng di truyền của một quần thể giao phối được thể hiện ở",
    opts: {
      A: "Số lượng cá thể và mật độ quần thể.",
      B: "Số loại kiểu hình khác nhau trong quần thể.",
      C: "Nhóm tuổi và tỉ lệ giới tính của quần thể.",
      D: "Tần số allele và tần số kiểu gene"
    },
    answer: "D"
  },
  {
    id: 19,
    q: "Tất cả các allele của các gene trong quần thể tạo nên",
    opts: {
      A: "Kiểu hình của quần thể.",
      B: "Kiểu gene của quần thể.",
      C: "Vốn gene của quần thể.",
      D: "Thành phần kiểu gene của quần thể."
    },
    answer: "C"
  },
  {
    id: 20,
    q: "Trong quần thể ngẫu phối đã cân bằng di truyền thì từ tỉ lệ kiểu hình có thể suy ra",
    opts: {
      A: "Tần số các allele và tỉ lệ các kiểu gene.",
      B: "Thành phần các allele đặc trưng của quần thể",
      C: "Vốn gene của quần thể.",
      D: "Tính ổn định của quần thể."
    },
    answer: "A"
  },
  {
    id: 21,
    q: "Một quần thể ngẫu phối có thành phần kiểu gene là 0,2AA: 0,8Aa. Theo lí thuyết, tần số allele A của quần thể này là",
    opts: {
      A: "0,4",
      B: "0,8",
      C: "0,2",
      D: "0,6"
    },
    answer: "D"
  }];
  
  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }
shuffleArray(questionsData);

const container = document.getElementById('questions');

questionsData.forEach((item, index) => {
  const qNumber = index + 1;

  const div = document.createElement('div');
  div.className = 'question';
  div.id = 'q' + qNumber;

  div.innerHTML = `
    <div class="qnum">Câu ${qNumber}:</div>
    <div class="qtext">${item.q}</div>
    <div class="options">
      ${Object.entries(item.opts).map(([key, val]) => `
        <label class="opt">
          <input type="radio" name="q${qNumber}" value="${key}">
          <strong>${key}.</strong> ${val}
        </label>
      `).join('')}
    </div>
  `;

  container.appendChild(div);
});


  // grading logic
  const submitBtn = document.getElementById('submitBtn');
  const resetBtn = document.getElementById('resetBtn');
  const scoreDiv = document.getElementById('score');
  const feedbackDiv = document.getElementById('feedback');

  submitBtn.addEventListener('click', ()=>{
  let correctCount = 0;
  let total = questionsData.length;

  for(let i=0;i<total;i++){
    const qNumber = i + 1;
    const selected = document.querySelector(`input[name="q${qNumber}"]:checked`);
    const qDiv = document.getElementById('q'+qNumber);

    qDiv.classList.remove('correct','wrong');
    const old = qDiv.querySelector('.note'); if(old) old.remove();

    const note = document.createElement('div');
    note.className = 'note small';

    if(!selected){
      note.textContent = '(Chưa trả lời)';
      qDiv.appendChild(note);
      continue;
    }

    if(selected.value === questionsData[i].answer){
      correctCount++;
      qDiv.classList.add('correct');
      note.textContent = `Đúng — đáp án: ${questionsData[i].answer}`;
    } else {
      qDiv.classList.add('wrong');
      note.textContent = `Sai — đáp án đúng: ${questionsData[i].answer}`;
    }

    qDiv.appendChild(note);
  }

  scoreDiv.innerHTML = `<strong>Kết quả: ${correctCount}/${total}</strong>`;
  submitBtn.disabled = true;
});

  resetBtn.addEventListener('click', ()=>{
    document.getElementById('quizForm').reset();
    // clear highlights/notes
    for(let i=1;i<=questionsData.length;i++){
      const qDiv = document.getElementById('q'+i);
      qDiv.classList.remove('correct','wrong');
      const note = qDiv.querySelector('.note'); if(note) note.remove();
      const un = qDiv.querySelector('.small'); if(un) un.remove();
    }
    scoreDiv.innerHTML='';
    feedbackDiv.innerHTML='';
    submitBtn.disabled = false;
  });
  </script>
</body>
</html>
